name: 'Publish iOS SDK'
description: 'Builds and releases the Thunder iOS SDK as a tagged GitHub Release'

inputs:
  version:
    description: 'Version to publish (e.g. 0.2.0)'
    required: true
  github_token:
    description: 'GitHub token with contents:write permission'
    required: true

runs:
  using: composite
  steps:
    - name: 🔨 Build
      shell: bash
      working-directory: tools/sdks/ios
      run: swift build

    - name: 🧪 Test
      shell: bash
      working-directory: tools/sdks/ios
      run: swift test

    - name: 🏷️ Create and push tag
      shell: bash
      run: |
        TAG="sdk/ios/v${{ inputs.version }}"
        git tag "$TAG"
        git push origin "$TAG"
      env:
        GH_TOKEN: ${{ inputs.github_token }}

    - name: 🚀 Create GitHub Release
      shell: bash
      run: |
        TAG="sdk/ios/v${{ inputs.version }}"
        gh release create "$TAG" \
          --title "Thunder iOS SDK v${{ inputs.version }}" \
          --notes "Thunder iOS SDK v${{ inputs.version }}. Source: tools/sdks/ios/"
      env:
        GH_TOKEN: ${{ inputs.github_token }}
