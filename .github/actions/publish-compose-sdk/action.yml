name: 'Publish Compose SDK'
description: 'Publishes the Thunder Compose SDK to GitHub Packages under io.thunder'

inputs:
  version:
    description: 'Version to publish (e.g. 0.2.0)'
    required: true
  android_version:
    description: 'Published io.thunder:android version to depend on'
    required: true
  github_token:
    description: 'GitHub token with packages:write permission'
    required: true

runs:
  using: composite
  steps:
    - name: 🔧 Setup Android Build Environment
      uses: ./.github/actions/setup-android-build

    - name: 🏷️ Patch version and Android dependency
      shell: bash
      run: |
        sed -i '' \
          "s/version = \"[0-9]*\.[0-9]*\.[0-9]*\"/version = \"${{ inputs.version }}\"/g" \
          tools/sdks/compose/build.gradle.kts
        ANDROID_VERSION="${{ inputs.android_version }}"
        sed -i '' \
          "s|api(project(\":android\"))|api(\"io.thunder:android:${ANDROID_VERSION}\")|" \
          tools/sdks/compose/build.gradle.kts

    - name: 🏗️ Patch Compose settings for standalone resolution
      shell: bash
      run: |
        # Remove local composite build reference
        sed -i '' '/includeBuild/d' tools/sdks/compose/settings.gradle.kts
        # Prepend pluginManagement so the Android Gradle Plugin resolves via google()
        cat - tools/sdks/compose/settings.gradle.kts > /tmp/compose-settings.gradle.kts << 'EOF'
        pluginManagement {
            repositories {
                google()
                mavenCentral()
                gradlePluginPortal()
            }
        }

        EOF
        mv /tmp/compose-settings.gradle.kts tools/sdks/compose/settings.gradle.kts
        # Add dependency resolution repos including GitHub Packages
        cat >> tools/sdks/compose/settings.gradle.kts << 'GRADLE_EOF'

        dependencyResolutionManagement {
            repositories {
                google()
                mavenCentral()
                maven {
                    url = uri("https://maven.pkg.github.com/${{ github.repository }}")
                    credentials {
                        username = System.getenv("GITHUB_ACTOR") ?: ""
                        password = System.getenv("GITHUB_TOKEN") ?: ""
                    }
                }
            }
        }
        GRADLE_EOF

    - name: 📦 Append GitHub Packages publishing repository
      shell: bash
      run: |
        cat >> tools/sdks/compose/build.gradle.kts << 'GRADLE_EOF'

        publishing {
            repositories {
                maven {
                    name = "GitHubPackages"
                    url = uri("https://maven.pkg.github.com/${{ github.repository }}")
                    credentials {
                        username = System.getenv("GITHUB_ACTOR") ?: ""
                        password = System.getenv("GITHUB_TOKEN") ?: ""
                    }
                }
            }
        }
        GRADLE_EOF

    - name: 🔨 Build
      shell: bash
      working-directory: tools/sdks/compose
      run: gradle build
      env:
        GITHUB_ACTOR: ${{ github.actor }}
        GITHUB_TOKEN: ${{ inputs.github_token }}

    - name: 🧪 Test
      shell: bash
      working-directory: tools/sdks/compose
      run: gradle test
      env:
        GITHUB_ACTOR: ${{ github.actor }}
        GITHUB_TOKEN: ${{ inputs.github_token }}

    - name: 🚀 Publish to GitHub Packages
      shell: bash
      working-directory: tools/sdks/compose
      run: gradle publish
      env:
        GITHUB_ACTOR: ${{ github.actor }}
        GITHUB_TOKEN: ${{ inputs.github_token }}
