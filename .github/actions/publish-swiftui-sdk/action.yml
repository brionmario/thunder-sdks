name: 'Publish SwiftUI SDK'
description: 'Builds and releases the Thunder SwiftUI SDK as a tagged GitHub Release'

inputs:
  version:
    description: 'Version to publish (e.g. 0.2.0)'
    required: true
  ios_version:
    description: 'Published iOS SDK version to depend on (e.g. 0.2.0)'
    required: true
  github_token:
    description: 'GitHub token with contents:write permission'
    required: true

runs:
  using: composite
  steps:
    - name: 🔗 Patch Package.swift to reference published iOS SDK
      shell: bash
      run: |
        IOS_TAG="sdk/ios/v${{ inputs.ios_version }}"
        sed -i '' \
          "s|\.package(path: \"../ios\")|.package(url: \"https://github.com/asgardeo/thunder\", revision: \"${IOS_TAG}\")|" \
          tools/sdks/swiftui/Package.swift

    - name: 🔨 Build
      shell: bash
      working-directory: tools/sdks/swiftui
      run: swift build

    - name: 🧪 Test
      shell: bash
      working-directory: tools/sdks/swiftui
      run: swift test

    - name: 🏷️ Create and push tag
      shell: bash
      run: |
        TAG="sdk/swiftui/v${{ inputs.version }}"
        git tag "$TAG"
        git push origin "$TAG"
      env:
        GH_TOKEN: ${{ inputs.github_token }}

    - name: 🚀 Create GitHub Release
      shell: bash
      run: |
        TAG="sdk/swiftui/v${{ inputs.version }}"
        gh release create "$TAG" \
          --title "Thunder SwiftUI SDK v${{ inputs.version }}" \
          --notes "Thunder SwiftUI SDK v${{ inputs.version }}. Depends on iOS SDK v${{ inputs.ios_version }}. Source: tools/sdks/swiftui/"
      env:
        GH_TOKEN: ${{ inputs.github_token }}
