name: 'Setup Android Build Environment'
description: 'Sets up JDK 17 and Gradle for building Android SDK libraries'

runs:
  using: composite
  steps:
    - name: ☕ Setup JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: temurin

    - name: 🐘 Setup Gradle
      uses: gradle/actions/setup-gradle@v3
      with:
        cache-read-only: false
