name: flutter_b2c
description: Thunder Flutter B2C sample — demonstrates sign-in, profile display, and sign-out.
version: 1.0.0

environment:
  sdk: ">=3.2.0 <4.0.0"
  flutter: ">=3.16.0"

dependencies:
  flutter:
    sdk: flutter
  thunderid_flutter:
    path: ../../../tools/sdks/flutter
  flutter_dotenv: ^5.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - .env
